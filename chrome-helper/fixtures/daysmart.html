<main data-provider="daysmart">
  <h1>DaySmart / Dash registration fixture</h1>
  <p>Keva Sports Center summer session</p>
  <form>
    <label>Participant first name <input name="participant_first" required></label>
    <label>Participant last name <input name="participant_last" required></label>
    <label>Date of birth <input name="participant_dob" required></label>
    <label>Parent email <input name="parent_email" required></label>
    <label>Medical notes <textarea name="medical"></textarea></label>
    <button type="button">Next</button>
    <button type="submit">Checkout</button>
  </form>
</main>
