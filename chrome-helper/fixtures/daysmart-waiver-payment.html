<main data-provider="daysmart" data-company="keva">
  <h1>Review &amp; Pay</h1>
  <section>
    <h2>Waiver and release</h2>
    <p>Please read and agree to the liability waiver before continuing.</p>
    <label><input type="checkbox" required> I agree to the waiver and release.</label>
  </section>
  <section>
    <h2>Payment</h2>
    <label>Card number <input name="card_number" autocomplete="cc-number"></label>
    <label>CVV <input name="cvv" autocomplete="cc-csc"></label>
  </section>
  <button type="submit">Confirm Registration</button>
</main>
