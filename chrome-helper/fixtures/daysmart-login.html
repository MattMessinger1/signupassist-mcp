<main data-provider="daysmart" data-company="keva">
  <h1>Keva Sports Center Member App</h1>
  <form action="/dash/index.php?action=Auth/login&amp;company=keva">
    <label>Email Address <input name="email" type="email" autocomplete="username"></label>
    <label>Password <input name="password" type="password" autocomplete="current-password"></label>
    <label><input type="checkbox" name="stay_signed_in"> Stay Signed In</label>
    <button type="submit">Login</button>
  </form>
  <a href="/dash/index.php?action=Auth/forgot">I forgot my password</a>
  <button type="button">Create Account</button>
</main>
